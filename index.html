<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cédric Sounard — Venture Map</title>
    <meta
      name="description"
      content="An interactive knowledge graph of Cédric Sounard's ventures and how they connect."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="graph"></div>

    <header id="masthead">
      <div class="id-card">
        <div class="id-main">
          <span class="brand-name">Cédric Sounard</span>
          <span class="brand-tag">Your Most Extroverted Geek — venture map</span>
        </div>
        <nav class="id-contact">
          <a class="id-link" href="tel:+32476092674"><span class="ic">☎</span><span>+32 476 09 26 74</span></a>
          <a class="id-link" href="mailto:cedric@sevenevents.be"><span class="ic">✉</span><span>cedric@sevenevents.be</span></a>
          <a class="id-link" href="https://www.linkedin.com/in/cedric-sounard/" target="_blank" rel="noopener"><span class="ic in">in</span><span>LinkedIn</span></a>
        </nav>
      </div>
      <button id="reset-view" title="Jump to a node, then hop along its connections">Explore</button>
    </header>

    <aside id="panel" class="hidden" aria-live="polite">
      <button id="panel-close" aria-label="Close">×</button>
      <div id="panel-body"></div>
    </aside>

    <div id="legend"></div>

    <footer id="hint">
      <span class="hint-cue"><span class="hint-tap">👆</span> Tap any node to explore</span>
      <span class="hint-sub">drag to orbit · scroll / pinch to zoom</span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
